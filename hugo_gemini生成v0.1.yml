# ==========================================
# 基础全局配置
# ==========================================
baseURL: "https://blog.allinone.us.kg/" # 网站的最终发布地址
title: xxj的All in One                 # 网站标题（显示在浏览器标签栏和页头）
languageCode: zh-cn                    # 语言代码
theme: tailbliss                       # 指定使用 tailbliss 主题
DefaultContentLanguage: zh-cn          # 默认内容语言
enableEmoji: true                      # 是否允许在正文中使用 Emoji 表情（如 :rocket:）
enableGitInfo: false                   # 是否从 Git 提交历史中获取最后修改时间
enableRobotsTXT: true                  # 是否生成 robots.txt（对 SEO 友好）
canonifyURLs: false                    # 是否规范化 URL（通常保持 false）
pagination:
  pagerSize: 9                         # 列表页每页显示的文章数量
darkmode_js:
  - assets/js/darkmode.js              # 深色模式的脚本路径
enableInlineShortcodes: true           # 是否启用内联短代码

# ==========================================
# Markdown 解析配置 (Goldmark)
# ==========================================
markup:
  goldmark:
    extensions:
      definitionList: true             # 支持定义列表
      footnote: true                   # 支持脚注
      linkify: true                    # 自动将 URL 转换为链接
      linkifyProtocol: https           # 默认链接协议
      strikethrough: true              # 支持删除线 ~~text~~
      table: true                      # 支持表格
      taskList: true                   # 支持任务列表 - [ ]
      typographer:                     # 排版插件（自动转换引号、省略号等）
        apostrophe: '&rsquo;'
        disable: false
        ellipsis: '&hellip;'
        emDash: '&mdash;'
        enDash: '&ndash;'
        leftAngleQuote: '&laquo;'
        leftDoubleQuote: '&ldquo;'
        leftSingleQuote: '&lsquo;'
        rightAngleQuote: '&raquo;'
        rightDoubleQuote: '&rdquo;'
        rightSingleQuote: '&rsquo;'
    parser:
      attribute:
        block: false
        title: true
      autoHeadingID: true              # 自动为标题生成 ID（方便锚点跳转）
      autoHeadingIDType: github        # 自动生成的ID格式，采用github风格
      wrapStandAloneImageWithinParagraph: true # 将图片包裹在 <p> 标签中
    renderer:
      hardWraps: false                 # 是否将换行符渲染为 <br>
      unsafe: true                     # 关键：设为 true 才能在 Markdown 里直接写 HTML（Tailbliss 常用）
      xhtml: false

# ==========================================
# 主题特定参数 (Params)
# ==========================================
params:
  author: Nusser Studios               # 作者名称
  authorimage: ../assets/images/global/author.webp # 作者头像路径
  og_image: /images/tailbliss-cover.png # 社交媒体分享时的预览图
  moto: "Super Fast, and Flexible"     # 座右铭或标语
  description: "基于 TailwindCSS 3 驱动的 Hugo 博客系统" # 站点描述
  disable_theme_toggle: false          # 是否禁用深浅色切换按钮
  disable_stay_uptodate: true          # 是否禁用底部的更新订阅栏

  # ------------------------------------------
  # 首页内容区块 (p1-p5)
  # Tailbliss 将首页拆分为多个 Section，你可以在这里修改文案
  # ------------------------------------------
  p1:
    heading: "我的使命"                 # 模块标题
    image: "images/pages/our-mission.png" # 对应配图
    content:
      - text: "这里可以填写关于你博客的核心价值或个人简介。"
  
  p2:
    heading: "技术栈与项目"
    image: "images/pages/hacktoberfest.jpg"
    content:
      - text: "这里支持多行文本叙述。"
      - type: "table"                  # 支持在首页区块展示表格
        columns:
          - heading: "类别"
            items: ["架构", "量化", "玄学"]
          - heading: "工具"
            items: ["Go/Python", "QMT", "Neo4j"]

  p3:
    heading: "合作伙伴或关注领域"
    content:
      - text: "可以展示一些 Logo 或者合作伙伴。"
    links:
      - text: 进一步了解
        url: "#"
    logos:
      - identifier: a
        image: "images/global/sample-logo.svg"
        alt: "Logo描述"

  p4:
    heading: "近期博文"
    content:
      - text: "这里通常是自动调取或手动配置的博客引言。"

  p5:
    heading: "保持联系"
    content:
      - text: "欢迎订阅我的周报或更新。"
    action: "#"
    label: "邮箱地址"
    placeholder: "请输入你的邮箱"
    button: "立即通知我"

  # ------------------------------------------
  # 社交媒体链接
  # ------------------------------------------
  social_media:
    github:
      enabled: true
      url: 'https://github.com/SigilZen'    # 替换为你的 GitHub
    twitter:
      enabled: true
      url: 'https://twitter.com/SigilZen'

# ==========================================
# 导航菜单配置
# ==========================================
menu:
  main:                                # 顶部主导航
    - identifier: prose
      name: 文章
      url: /prose/
      weight: 10                       # 权重越小越靠前
    - identifier: about
      name: 关于
      url: /about/
      weight: 20
    - identifier: categories
      pre: dropdown                    # 带有下拉菜单样式
      name: 分类
      weight: 30
    - identifier: contact
      name: 联系
      url: /contact/
      weight: 50
      
  footer:                              # 页脚导航
    - identifier: about
      name: 关于
      url: /about/
      weight: 10
    - identifier: blog
      name: 博客
      url: /categories/blog/
      weight: 20

# ==========================================
# 分类系统 (Taxonomies)
# ==========================================
taxonomies:
  category: Categories                 # 分类映射
  tag: Tags                            # 标签映射

# ==========================================
# 隐私与合规 (隐私政策设置)
# ==========================================
privacy:
  googleAnalytics:
    anonymizeIP: true
    disable: false
  youtube:
    privacyEnhanced: true              # 启用增强隐私模式的视频嵌入

# ==========================================
# 模块要求
# ==========================================
module:
  hugoVersion:
    extended: true                     # 必须使用 Hugo Extended 版本（处理 Tailwind 编译）
    min: "0.148.2"                     # 最低版本号要求